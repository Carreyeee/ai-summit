        <line x1="540" y1="123" x2="540" y2="150"/>
        <line x1="580" y1="106" x2="580" y2="150"/>
        <line x1="620" y1="96" x2="620" y2="150"/>
        <line x1="680" y1="96" x2="680" y2="150"/>
        <line x1="720" y1="106" x2="720" y2="150"/>
        <line x1="760" y1="123" x2="760" y2="150"/>
      </g>
    </g>

    <!-- right CBD cluster -->
    <rect x="840" y="104" width="32" height="96"/>
    <rect x="876" y="128" width="24" height="72"/>
    <rect x="904" y="80" width="40" height="120"/>
    <rect x="920" y="58" width="8" height="22"/>
